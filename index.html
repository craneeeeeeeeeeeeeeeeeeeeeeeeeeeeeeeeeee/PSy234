<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Clock - New York & India</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      background-image: 
        repeating-conical-gradient(
          white 0% 25%,
          #f0f0f0 25% 50%
        );
      background-size: 100px 100px;
      font-family: 'Courier New', monospace;
    }
    .clock {
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
      width: 180px;
      font-size: 1.2em;
    }
    h3 {
      margin: 0 0 10px;
      color: #333;
    }
    .time {
      font-weight: bold;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="clock">
    <h3>New York</h3>
    <div id="ny-time" class="time">Loading...</div>
  </div>
  <div class="clock">
    <h3>India</h3>
    <div id="india-time" class="time">Loading...</div>
  </div>

  <script>
    function updateClocks() {
      const options = { 
        timeZone: 'America/New_York', 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit', 
        hour12: true 
      };
      document.getElementById('ny-time').textContent = 
        new Intl.DateTimeFormat('en-US', options).format(new Date());

      options.timeZone = 'Asia/Kolkata';
      document.getElementById('india-time').textContent = 
        new Intl.DateTimeFormat('en-US', options).format(new Date());
    }

    setInterval(updateClocks, 1000);
    updateClocks(); // Initial call
  </script>
</body>
</html>
